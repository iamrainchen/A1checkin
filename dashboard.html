
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A-Team 董顧大使團 · 出席統計儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FAFAF7;--card:#FFFFFF;--ink:#1B1B1A;--muted:#8C887E;--line:#ECE8DF;--red:#C8102E;--gold:#C9A24B;--present:#1FA463;--proxy:#C9862B}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Noto Sans TC",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1120px;margin:0 auto;padding:24px 18px 60px}
  .eyebrow{font-size:12px;letter-spacing:.18em;color:var(--gold);font-weight:700}
  h1{font-size:24px;margin:3px 0 0;font-weight:900}
  .src{font-size:12.5px;color:var(--muted);margin-top:6px}
  .src.demo{color:var(--proxy);font-weight:600}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 6px}
  .filters select{border:1px solid var(--line);background:var(--card);border-radius:11px;padding:10px 13px;font-size:14px;font-family:inherit;font-weight:600;outline:none;cursor:pointer}
  .filters select:focus{border-color:var(--gold)}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:14px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .kpi .n{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600}
  .kpi.g .n{color:var(--present)} .kpi.o .n{color:var(--proxy)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 10px}
  .card.full{grid-column:1/-1}
  .card h3{margin:0 0 12px;font-size:14px;font-weight:700}
  .cbox{position:relative;height:260px}
  .cbox.tall{height:520px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child,th:nth-child(2),td:nth-child(2),th:nth-child(3),td:nth-child(3){text-align:left}
  th{font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;user-select:none}
  th.sorted{color:var(--ink)}
  td.rate{font-weight:800;font-variant-numeric:tabular-nums}
  tr.perfect td:first-child{box-shadow:inset 3px 0 var(--gold)} 
  tr.low td:first-child{box-shadow:inset 3px 0 var(--red)}
  .tsearch{border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;width:200px;margin-bottom:10px}
  .tsearch:focus{border-color:var(--gold)}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px}
  .tag.gold{color:var(--gold);background:#FBF6EA} .tag.red{color:var(--red);background:#FBEEEC}
  .tlegend{font-size:11.5px;font-weight:600;color:var(--muted);margin-left:6px}
  .tlegend i{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:middle;margin-right:3px}
  .chgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:10px}
  .chtile{border:1px solid var(--line);border-radius:12px;padding:12px 13px}
  .chtile .cn{font-size:13px;font-weight:700}
  .chtile .cr{font-size:25px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;margin-top:5px}
  .chtile .cs{font-size:11px;color:var(--muted);margin-top:4px}
  .chtile.g{background:#EAF8F0;border-color:#BBE6CD}.chtile.g .cr{color:var(--present)}
  .chtile.y{background:#FBF4E3;border-color:#EBDCB4}.chtile.y .cr{color:#B8860B}
  .chtile.r{background:#FBEEEC;border-color:#F3CFC9}.chtile.r .cr{color:var(--red)}
  .twrap{overflow:auto;max-height:560px}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">A-TEAM 董顧大使團</div>
  <h1>出席統計儀表板</h1>
  <div class="src demo" id="src">目前顯示範例資料（尚未連線）· 接上報到記錄後即為真實數據</div>
  <div class="filters">
    <select id="fRange"><option value="all">全部場次</option><option value="6">近 6 場</option><option value="3">近 3 場</option></select>
    <select id="fRegion"><option value="all">全部區域</option><option value="北市北區">北市北區</option><option value="三五八蘆區">三五八蘆區</option></select>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="grid">
    <div class="card full"><h3>逐場出席率趨勢</h3><div class="cbox"><canvas id="cTrend"></canvas></div></div>
    <div class="card"><h3>區域比較 · 關鍵指標</h3><div class="cbox"><canvas id="cRegBar"></canvas></div></div>
    <div class="card"><h3>逐場到席率 · 兩區對照</h3><div class="cbox"><canvas id="cRegTrend"></canvas></div></div>
    <div class="card"><h3>本人 / 代理 / 未到（逐場人數）</h3><div class="cbox"><canvas id="cStack"></canvas></div></div>
    <div class="card"><h3>各職稱出席率</h3><div class="cbox"><canvas id="cRole"></canvas></div></div>
    <div class="card full"><h3>各分會董顧大使團 · 出席率 <span class="tlegend"><i style="background:#1FA463"></i>≥80%　<i style="background:#E3B341"></i>60–79%　<i style="background:#C8102E"></i>&lt;60%</span></h3><div id="chGrid" class="chgrid"></div></div>
  </div>
  <div class="card full" style="margin-top:14px">
    <h3>個人出席率明細</h3>
    <input class="tsearch" id="tSearch" placeholder="搜尋姓名 / 分會…">
    <div class="twrap"><table id="ptable"></table></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const API = "https://script.google.com/macros/s/AKfycbw5PYdytxOWpFbqOoICpeGPxx_T58p_fvjNRxbqk_9t_ur-LdYBOuo_SnGQEOv83AyP/exec";  /* 之後貼上「報到記錄」的 Apps Script 網址（?action=records 回傳所有列）。留空＝範例資料 */
const RAW = [
["北市北區","","大區董","楊日陞"],["北市北區","長和/長城","董顧/大使","曾惠君"],["北市北區","長城","助理大使","謝宥騏"],["北市北區","長和","大使","張婉婧"],["北市北區","長佑","董顧","陳麗惠"],["北市北區","長佑","大使","張煥晨"],["北市北區","長佑","助理大使","謝雯筑"],["北市北區","長翼","董顧","廖筱蘭"],["北市北區","長翼","大使","劉宜賢"],["北市北區","長翼","助理大使","蔡佩玲"],["北市北區","長悅","董顧","鍾坤宏"],["北市北區","長悅","大使","劉宸緯"],["北市北區","長翔","董顧","詹鴻鵠"],["北市北區","長翔","大使","葉炘然"],["北市北區","長翔","助理大使","郭亭君"],["北市北區","長輝","董顧","游姿菱"],["北市北區","長輝","助理大使","林昱璋"],["北市北區","長利","董顧","張文婷"],["北市北區","長利","大使","郭家宏"],["北市北區","長利","助理大使","蘇彥宇"],["三五八蘆區","三蘆區執行長金鈺/金利/金合/金虎","區董(準)","郭愛珠"],["三五八蘆區","金鈺","大使","王定廣"],["三五八蘆區","金鈺","助理大使","黃湍淳"],["三五八蘆區","金利","大使(準)","蔡馨葳"],["三五八蘆區","金利","助理大使","方榮久"],["三五八蘆區","金虎","董顧","蕭淑蓉"],["三五八蘆區","金虎","大使","陳宥寧"],["三五八蘆區","金虎","助理大使","劉芯怡"],["三五八蘆區","金合","董顧","洪岳裕"],["三五八蘆區","金合","大使","廖羿為"],["三五八蘆區","金合","助理大使","吳宜靜"],["三五八蘆區","三蘆區 金暘/金美/金盟/金鑫/金安","區董","李鴻毅"],["三五八蘆區","金暘","董顧","王彥萍"],["三五八蘆區","金暘","助理大使","李佳家"],["三五八蘆區","金美","董顧","張松源"],["三五八蘆區","金美","大使","楊哲瑋"],["三五八蘆區","金美","助理大使","邱偉綸"],["三五八蘆區","金美","助理大使","王思穎"],["三五八蘆區","金安","董顧","陳沛緹"],["三五八蘆區","金安","大使","張紘賓"],["三五八蘆區","金安","助理大使","楊榮峯"],["三五八蘆區","金鑫","董顧","張力文"],["三五八蘆區","金鑫","大使","陳子雯"],["三五八蘆區","金鑫","助理大使","楊先震"],["三五八蘆區","金盟","董顧","周玉茹"],["三五八蘆區","金盟","大使","邱耀賢"],["三五八蘆區","金盟","助理大使","莊博全"],["三五八蘆區","金盟","助理大使","王柏堯"],["三五八蘆區","三蘆區 金佑/金澎湃/金英","區董(準)","孫成育"],["三五八蘆區","金佑","董顧","王執定"],["三五八蘆區","金佑","大使","曾士銘"],["三五八蘆區","金佑","助理大使","洪儀君"],["三五八蘆區","金澎湃","董顧","江學洋"],["三五八蘆區","金澎湃","大使","駱湘樺"],["三五八蘆區","金澎湃","助理大使","陳夗媃"],["三五八蘆區","金英","董顧","李赫茗"],["三五八蘆區","金英","大使","劉玓岡"],["三五八蘆區","金英","助理大使","林澐薪"]
];
const ROSTER = RAW.map(a=>({region:a[0],chapter:a[1],role:a[2],name:a[3]}));
const ROLE_ORDER=['大區董','區董','區董(準)','董顧','董顧/大使','大使','大使(準)','助理大使'];
const C={present:'#1FA463',proxy:'#C9862B',absent:'#E2DDD2',gold:'#C9A24B',yellow:'#E3B341',ink:'#1B1B1A',line:'#ECE8DF',red:'#C8102E'};
let DATA=[], region='all', range='all', tSort={k:'rate',dir:-1}, tQ='';
const CHARTS={};
const $=s=>document.querySelector(s);
const pct=(n,d)=>d?Math.round(n/d*100):0;

/* ---- 範例資料產生 ---- */
const DEMO_MEETINGS=[{date:'2026-01-11',meeting:'1月月會'},{date:'2026-02-08',meeting:'2月月會'},{date:'2026-03-08',meeting:'3月月會'},{date:'2026-04-12',meeting:'4月月會'},{date:'2026-05-10',meeting:'5月月會'},{date:'2026-06-14',meeting:'6月月會'}];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function strhash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function genDemo(){const recs=[];ROSTER.forEach(p=>{const base=0.5+(strhash(p.name)%50)/100;DEMO_MEETINGS.forEach((m,mi)=>{const rng=mulberry32(strhash(p.name)+mi*7919);const r=rng();let status='未到',paid='';if(r<base){status=rng()<0.12?'代理':'本人';paid=rng()<0.9?'已收':'未收';}recs.push({date:m.date,meeting:m.meeting,name:p.name,region:p.region,chapter:p.chapter,role:p.role,status:status,paid:paid});});});return recs;}

/* ---- 載入 ---- */
function populateRange(){
  const ms=getMeetings(DATA);
  let h='<option value="all">全部場次</option><option value="3">近 3 場</option><option value="6">近 6 場</option><optgroup label="指定單場">';
  ms.slice().reverse().forEach(m=>{h+='<option value="m:'+m.key+'">'+m.date+'　'+m.meeting+'</option>';});
  h+='</optgroup>';
  $('#fRange').innerHTML=h;$('#fRange').value=range;
}
async function load(){
  if(API){try{const d=await fetch(API+(API.includes('?')?'&':'?')+'action=records&t='+Date.now()).then(r=>r.json());if(d&&d.ok&&d.records){DATA=d.records;$('#src').className='src';$('#src').textContent='真實數據 · 共 '+getMeetings(DATA).length+' 場';populateRange();draw();return;}}catch(e){}}
  DATA=genDemo();populateRange();draw();
}

function getMeetings(data){const seen={},arr=[];data.forEach(r=>{const k=r.date+'|'+r.meeting;if(!seen[k]){seen[k]=1;arr.push({date:r.date,meeting:r.meeting,key:k});}});arr.sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0));return arr;}

function scope(){
  let ms=getMeetings(DATA);
  if(range==='3'||range==='6')ms=ms.slice(-parseInt(range,10));
  else if(range.indexOf('m:')===0){const key=range.slice(2);ms=ms.filter(m=>m.key===key);}
  const keys=new Set(ms.map(m=>m.key));
  const recs=DATA.filter(r=>(region==='all'||r.region===region)&&keys.has(r.date+'|'+r.meeting));
  return {ms,recs};
}
function isLead(role){return role==='大區董'||role==='區董'||role==='區董(準)';}

function draw(){
  const {ms,recs}=scope();
  /* 逐場 */
  const per=ms.map(m=>{const rr=recs.filter(r=>r.date+'|'+r.meeting===m.key);const tot=rr.length;const self=rr.filter(r=>r.status==='本人').length;const proxy=rr.filter(r=>r.status==='代理').length;const present=self+proxy;const paid=rr.filter(r=>r.status!=='未到'&&r.paid==='已收').length;return {label:m.meeting,tot,self,proxy,present,absent:tot-present,paid};});
  const T=per.reduce((a,m)=>({tot:a.tot+m.tot,present:a.present+m.present,self:a.self+m.self,proxy:a.proxy+m.proxy,paid:a.paid+m.paid}),{tot:0,present:0,self:0,proxy:0,paid:0});

  /* KPI */
  $('#kpis').innerHTML=[
    ['',ms.length,'場次'],
    ['g',pct(T.present,T.tot)+'%','平均到席率'],
    ['g',pct(T.self,T.tot)+'%','本人出席率'],
    ['o',pct(T.proxy,T.present)+'%','代理比例'],
    ['g',pct(T.paid,T.present)+'%','收費完成率']
  ].map(k=>'<div class="kpi '+k[0]+'"><div class="n">'+k[1]+'</div><div class="l">'+k[2]+'</div></div>').join('');

  /* 趨勢線 */
  mkChart('cTrend','line',{labels:per.map(m=>m.label),datasets:[
    ds('總到席率',per.map(m=>pct(m.present,m.tot)),C.present),
    ds('本人出席率',per.map(m=>pct(m.self,m.tot)),C.gold),
    ds('收費完成率',per.map(m=>pct(m.paid,m.present)),C.proxy)
  ]},pctY());

  /* 堆疊 */
  mkChart('cStack','bar',{labels:per.map(m=>m.label),datasets:[
    dsb('本人',per.map(m=>m.self),C.present),
    dsb('代理',per.map(m=>m.proxy),C.proxy),
    dsb('未到',per.map(m=>m.absent),C.absent)
  ]},stackOpt());

  /* 各職稱 */
  const roleMap={};recs.forEach(r=>{(roleMap[r.role]=roleMap[r.role]||[]).push(r);});
  const roleKeys=Object.keys(roleMap).sort((a,b)=>{const ia=ROLE_ORDER.indexOf(a),ib=ROLE_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  mkChart('cRole','bar',{labels:roleKeys,datasets:[dsb('出席率',roleKeys.map(k=>{const a=roleMap[k];return pct(a.filter(r=>r.status!=='未到').length,a.length);}),C.gold)]},pctYbar());

  /* 各分會 */
  const chMap={},chOrder=[];recs.forEach(r=>{if(isLead(r.role))return;const k=r.chapter||'其他';if(!(k in chMap)){chMap[k]=[];chOrder.push(k);}chMap[k].push(r);});
  const chData=chOrder.map(k=>({k,att:chMap[k].filter(r=>r.status!=='未到').length,tot:chMap[k].length,rate:pct(chMap[k].filter(r=>r.status!=='未到').length,chMap[k].length)})).sort((a,b)=>b.rate-a.rate);
  const tierCls=r=> r>=80?'g':(r>=60?'y':'r');
  document.getElementById('chGrid').innerHTML=chData.map(x=>'<div class="chtile '+tierCls(x.rate)+'"><div class="cn">'+x.k+'</div><div class="cr">'+x.rate+'%</div><div class="cs">'+x.att+'/'+x.tot+' 到席</div></div>').join('');

  /* 區域比較（固定兩區，依日期範圍，不受區域下拉影響）*/
  const REGIONS=['北市北區','三五八蘆區'],RCOL={'北市北區':C.gold,'三五八蘆區':C.present};
  const rkeys=new Set(ms.map(m=>m.key));
  const regAll=DATA.filter(r=>rkeys.has(r.date+'|'+r.meeting));
  const RA=REGIONS.map(reg=>{const rr=regAll.filter(r=>r.region===reg);const tot=rr.length,self=rr.filter(r=>r.status==='本人').length,proxy=rr.filter(r=>r.status==='代理').length,present=self+proxy,paid=rr.filter(r=>r.status!=='未到'&&r.paid==='已收').length;return {tot,self,proxy,present,paid};});
  mkChart('cRegBar','bar',{labels:['到席率','本人出席率','代理比例','收費完成率'],datasets:REGIONS.map((reg,i)=>dsb(reg,[pct(RA[i].present,RA[i].tot),pct(RA[i].self,RA[i].tot),pct(RA[i].proxy,RA[i].present),pct(RA[i].paid,RA[i].present)],RCOL[reg]))},pctY());
  mkChart('cRegTrend','line',{labels:per.map(m=>m.label),datasets:REGIONS.map(reg=>ds(reg,ms.map(m=>{const rr=regAll.filter(r=>r.region===reg&&r.date+'|'+r.meeting===m.key);return pct(rr.filter(r=>r.status!=='未到').length,rr.length);}),RCOL[reg]))},pctY());

  /* 個人明細 */
  buildTable(recs,ms.length);
}

function ds(label,data,color){return {label,data,borderColor:color,backgroundColor:color+'22',borderWidth:2.5,tension:.35,pointRadius:3,pointBackgroundColor:color,fill:false};}
function dsb(label,data,color){return {label,data,backgroundColor:color,borderRadius:5,borderWidth:0};}
function baseOpt(){return {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Noto Sans TC',size:12},boxWidth:12,padding:14}}}};}
function pctY(){const o=baseOpt();o.scales={y:{min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:C.line}},x:{grid:{display:false}}};return o;}
function pctYbar(horizontal){const o=baseOpt();o.plugins.legend.display=false;const ax={min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:C.line}};if(horizontal){o.scales={x:ax,y:{grid:{display:false},ticks:{font:{size:11}}}};}else{o.scales={y:ax,x:{grid:{display:false}}};}return o;}
function stackOpt(){const o=baseOpt();o.scales={x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{color:C.line}}};return o;}
function mkChart(id,type,data,options){if(CHARTS[id])CHARTS[id].destroy();CHARTS[id]=new Chart(document.getElementById(id),{type,data,options});}

function buildTable(recs,nMeet){
  const byName={};recs.forEach(r=>{const o=byName[r.name]||(byName[r.name]={name:r.name,chapter:r.chapter,role:r.role,region:r.region,att:0,self:0,proxy:0,paid:0,tot:0});o.tot++;if(r.status!=='未到'){o.att++;if(r.status==='本人')o.self++;else o.proxy++;if(r.paid==='已收')o.paid++;}});
  let rows=Object.values(byName).map(o=>({...o,rate:pct(o.att,o.tot)}));
  if(tQ)rows=rows.filter(o=>o.name.includes(tQ)||(o.chapter&&o.chapter.includes(tQ)));
  rows.sort((a,b)=>{let x=a[tSort.k],y=b[tSort.k];if(typeof x==='string'){x=x.localeCompare(y);return tSort.dir*x;}return tSort.dir*(x-y);});
  const cols=[['name','姓名'],['chapter','分會'],['role','職稱'],['rate','到席率'],['att','到席'],['self','本人'],['proxy','代理'],['paid','收費']];
  let h='<thead><tr>'+cols.map(c=>'<th class="'+(tSort.k===c[0]?'sorted':'')+'" onclick="sortT(\''+c[0]+'\')">'+c[1]+(tSort.k===c[0]?(tSort.dir<0?' ▼':' ▲'):'')+'</th>').join('')+'</tr></thead><tbody>';
  h+=rows.map(o=>{const cls=o.rate===100?'perfect':(o.rate<50?'low':'');const tag=o.rate===100?' <span class="tag gold">全勤</span>':(o.rate<50?' <span class="tag red">常缺席</span>':'');return '<tr class="'+cls+'"><td>'+o.name+tag+'</td><td>'+(o.chapter||'—')+'</td><td>'+o.role+'</td><td class="rate">'+o.rate+'%</td><td>'+o.att+'/'+o.tot+'</td><td>'+o.self+'</td><td>'+o.proxy+'</td><td>'+o.paid+'</td></tr>';}).join('');
  $('#ptable').innerHTML=h+'</tbody>';
}
function sortT(k){if(tSort.k===k)tSort.dir*=-1;else{tSort.k=k;tSort.dir=(k==='name'||k==='chapter'||k==='role')?1:-1;}draw();}

$('#fRange').addEventListener('change',e=>{range=e.target.value;draw();});
$('#fRegion').addEventListener('change',e=>{region=e.target.value;draw();});
$('#tSearch').addEventListener('input',e=>{tQ=e.target.value;draw();});
load();
</script>
</body>
</html>
