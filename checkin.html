
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A-Team 董顧大使團 · 現場報到</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF7; --card:#FFFFFF; --ink:#1B1B1A; --muted:#8C887E;
    --line:#ECE8DF; --red:#C8102E; --gold:#C9A24B;
    --present:#1FA463; --present-bg:#E9F8EF; --present-line:#BBE6CD;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:"Noto Sans TC",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
    padding:0 0 env(safe-area-inset-bottom);-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 120px}

  header{padding:8px 2px 14px}
  .eyebrow{font-size:12px;letter-spacing:.18em;color:var(--gold);font-weight:700}
  h1{font-size:19px;margin:2px 0 0;font-weight:700;letter-spacing:.01em}
  .countbox{display:flex;align-items:flex-end;gap:10px;margin-top:14px}
  .count{font-size:54px;line-height:.9;font-weight:900;font-variant-numeric:tabular-nums;color:var(--present)}
  .count .total{font-size:22px;color:var(--muted);font-weight:700}
  .count-label{font-size:13px;color:var(--muted);padding-bottom:6px}
  .bar{height:8px;border-radius:99px;background:var(--line);margin-top:12px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,#27B873,var(--present));transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
  .chip{font-size:12.5px;color:var(--muted);background:var(--card);border:1px solid var(--line);
    border-radius:99px;padding:5px 11px;font-weight:500}
  .chip b{color:var(--ink);font-weight:700}

  .search{position:relative;margin-top:16px}
  .search input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;
    padding:13px 14px 13px 40px;font-size:16px;font-family:inherit;outline:none;box-shadow:var(--shadow)}
  .search input:focus{border-color:var(--gold)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.4}

  .group{margin-top:22px}
  .group h2{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;
    margin:0 0 9px;display:flex;align-items:center;gap:8px}
  .group h2 .g-count{margin-left:auto;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .group h2::before{content:"";width:6px;height:6px;border-radius:99px;background:var(--gold)}

  .row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:15px;padding:13px 15px;margin-bottom:9px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .08s,border-color .2s,background .2s;user-select:none}
  .row:active{transform:scale(.985)}
  .row.on{background:var(--present-bg);border-color:var(--present-line)}
  .tick{width:30px;height:30px;border-radius:99px;border:2px solid var(--line);flex:0 0 auto;
    display:grid;place-items:center;transition:.2s}
  .row.on .tick{background:var(--present);border-color:var(--present)}
  .tick svg{opacity:0;transform:scale(.5);transition:.2s}
  .row.on .tick svg{opacity:1;transform:scale(1)}
  .who{flex:1;min-width:0}
  .who .nm{font-size:17px;font-weight:700;letter-spacing:.01em}
  .who .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .row.on .who .sub .t{color:var(--present);font-weight:700}
  .role-tag{font-size:11px;font-weight:700;color:var(--gold);flex:0 0 auto}

  .empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px}

  .dock{position:fixed;left:0;right:0;bottom:0;background:rgba(250,250,247,.9);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
  .dock-in{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .me{font-size:13px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .me b{color:var(--ink)}
  .btn{border:1px solid var(--line);background:var(--card);border-radius:11px;padding:9px 13px;
    font-size:13px;font-weight:700;font-family:inherit;color:var(--ink);cursor:pointer}
  .btn:active{transform:scale(.97)}

  .toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:14px;font-weight:500;
    opacity:0;pointer-events:none;transition:.3s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .banner{background:#FBEEEC;color:var(--red);border:1px solid #F3CFC9;border-radius:12px;
    padding:11px 14px;font-size:13.5px;margin-top:14px;display:none;font-weight:500}

  .overlay{position:fixed;inset:0;background:rgba(27,27,26,.45);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:100}
  .overlay.show{display:flex}
  .sheet{background:var(--card);border-radius:20px;padding:26px 22px;max-width:380px;width:100%;box-shadow:var(--shadow)}
  .sheet h3{margin:0 0 6px;font-size:18px;font-weight:700}
  .sheet p{margin:0 0 16px;font-size:13.5px;color:var(--muted);line-height:1.6}
  .sheet input{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 14px;
    font-size:16px;font-family:inherit;outline:none;margin-bottom:14px}
  .sheet input:focus{border-color:var(--gold)}
  .sheet .go{width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;
    padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
  .sheet code{background:var(--bg);padding:2px 6px;border-radius:5px;font-size:12px}

  :root{--proxy:#C9862B;--proxy-bg:#FBF3E4;--proxy-line:#EBD9B4}
  .note{display:inline-block;margin-top:9px;font-size:11.5px;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:4px 11px;line-height:1.5}
  .msel{display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:8px 14px;font-size:14px;font-weight:700;box-shadow:var(--shadow);cursor:pointer}
  .msel:active{transform:scale(.98)} .msel .d{color:var(--gold)} .msel .ar{color:var(--muted);font-size:11px;font-weight:600}
  .brk{margin-top:11px;font-size:12.5px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .brk b{color:var(--ink);font-variant-numeric:tabular-nums} .brk .p{color:var(--proxy)} .brk .due{color:var(--red)}
  .stlink{color:var(--gold);font-weight:700;cursor:pointer;margin-left:auto}
  .row{align-items:center}
  .row.on{background:var(--present-bg);border-color:var(--present-line)}
  .row.proxy{background:var(--proxy-bg);border-color:var(--proxy-line)}
  .row.on .tick{background:var(--present);border-color:var(--present)}
  .row.proxy .tick{background:var(--proxy);border-color:var(--proxy)}
  .pk{font-size:12px;font-weight:900;color:#fff}
  .sub{display:flex;flex-wrap:wrap;gap:2px 8px}
  .sub .t{color:var(--present);font-weight:700} .sub .tp{color:var(--proxy);font-weight:700}
  .sub .paid{color:var(--present);font-weight:700} .sub .duetxt{color:var(--red);font-weight:700}
  .acts{display:flex;gap:6px;flex:0 0 auto}
  .pbtn{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:8px 10px;font-size:12px;font-weight:700;color:var(--muted);font-family:inherit;cursor:pointer;min-width:44px}
  .pbtn:active{transform:scale(.95)}
  .pbtn.pon{color:var(--proxy);border-color:var(--proxy-line);background:var(--proxy-bg)}
  .pbtn.due{color:var(--red);border-color:#F3CFC9;background:#FBEEEC}
  .pbtn.paid{color:var(--present);border-color:var(--present-line);background:var(--present-bg)}
  .addbtn{width:100%;margin-top:8px;border:1.5px dashed var(--line);background:transparent;border-radius:13px;padding:14px;font-size:14px;font-weight:700;color:var(--muted);font-family:inherit;cursor:pointer}
  .mlist{margin:0 0 4px;max-height:34vh;overflow:auto}
  .mitem{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer}
  .mitem.cur{border-color:var(--present-line);background:var(--present-bg)}
  .mitem .mn{font-weight:700;font-size:15px} .mitem .ms{font-size:12px;color:var(--muted);margin-top:2px}
  .mitem .cnt{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:700}
  .mnew{border-top:1px solid var(--line);margin-top:8px;padding-top:14px}
  .mnew label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px}
  .mnew .rowi{display:flex;gap:8px;margin-bottom:10px}
  .sheet input,.sheet select{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:15px;font-family:inherit;outline:none;margin-bottom:10px;background:var(--card)}
  .mnew .rowi input{margin-bottom:0}
  .stbtn{width:100%;margin-bottom:8px;text-align:left;padding:13px 14px}
  .ssec{font-size:12px;font-weight:700;color:var(--muted);margin:16px 0 6px;letter-spacing:.04em}
  .strow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .strow .lb{width:92px;flex:0 0 auto;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .strow .sbar{flex:1;height:7px;background:var(--line);border-radius:99px;overflow:hidden}
  .strow .sbar i{display:block;height:100%;background:var(--present);border-radius:99px}
  .strow .nm2{font-size:12px;color:var(--muted);min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
  .strow .pct{font-weight:800;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">A-TEAM 董顧大使團</div>
    <h1>月會現場報到</h1>
    <div class="msel" id="msel" onclick="openMeet()"><span class="d" id="mselD"></span><span id="mselN"></span><span class="ar">切換 ▾</span></div>
    <div class="note">點名字＝本人 · 按代理＝代理 · 都要收費 · 已標記者鎖定，長按可修改</div>
    <div class="banner" id="banner"></div>
    <div class="countbox">
      <div class="count"><span id="cIn">0</span><span class="total"> / <span id="cTot">0</span></span></div>
      <div class="count-label">已到席<br>（本人＋代理）</div>
    </div>
    <div class="bar"><i id="bar"></i></div>
    <div class="brk" id="brk"></div>
  </header>
  <div class="chips" id="chips" style="margin-top:10px"></div>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="search" placeholder="搜尋姓名 / 分會…" autocomplete="off">
  </div>
  <div id="list"></div>
  <button class="addbtn" onclick="openAdd()">＋ 名單外新增</button>
</div>
<div class="dock"><div class="dock-in">
  <div class="me" id="me" onclick="openStaff()">—</div>
  <button class="btn" onclick="exportCsv()">匯出本場</button>
</div></div>
<div class="toast" id="toast"></div>
<div class="overlay" id="meet"><div class="sheet">
  <h3>選擇會議</h3>
  <p style="margin:-2px 0 12px;font-size:12.5px;color:var(--muted)">點清單中的任一場即可切換（不必按下方建立）。</p>
  <div class="mlist" id="mlist"></div>
  <button class="btn" id="newToggle" style="width:100%;margin-top:4px" onclick="toggleNew()">＋ 建立新會議</button>
  <div class="mnew" id="mnewBox" style="display:none">
    <div class="rowi"><input type="date" id="newDate" style="max-width:150px"><input type="text" id="newName" placeholder="會議名稱，如 7月月會"></div>
    <button class="go" onclick="createMeeting()">建立並切換</button>
  </div>
  <button class="btn" style="width:100%;margin-top:8px" onclick="closeMeet()">關閉</button>
  <button class="btn" style="width:100%;margin-top:6px;color:var(--red);border-color:#F3CFC9" onclick="resetMeeting()">清空本場報到狀態</button>
</div></div>
<div class="overlay" id="addov"><div class="sheet">
  <h3>新增名單外人員</h3>
  <p>只加入這一場、不影響主名單，加入後自動標記本人到。</p>
  <input id="apName" placeholder="姓名（必填）">
  <div style="display:flex;gap:8px"><input id="apChapter" placeholder="分會（選填）"><input id="apRole" placeholder="職稱（選填）"></div>
  <select id="apRegion"><option>鴻毅區</option><option>愛珠區</option><option>成育區</option><option>麗惠區</option><option>文婷區</option><option>來賓</option></select>
  <button class="go" onclick="doAddPerson()">新增並報到</button>
  <button class="btn" style="width:100%;margin-top:8px" onclick="closeAdd()">取消</button>
</div></div>
<div class="overlay" id="statsov"><div class="sheet" style="max-width:430px">
  <h3>本場統計</h3>
  <div id="statsbody" style="max-height:62vh;overflow:auto"></div>
  <div style="display:flex;gap:8px;margin-top:14px">
    <button class="btn" style="flex:1" onclick="copyStatsText()">複製文字</button>
    <button class="btn" style="flex:1;border-color:var(--gold);background:#FBF6EA;color:#9A7A2E" onclick="exportStatsCard()">存成圖卡</button>
  </div>
  <button class="btn" style="width:100%;margin-top:8px" onclick="closeStats()">關閉</button>
</div></div>
<div class="overlay" id="editov"><div class="sheet">
  <h3 id="editName"></h3>
  <p>修改這位的報到狀態：</p>
  <div id="editOpts"></div>
  <button class="btn" style="width:100%;margin-top:4px" onclick="closeEdit()">關閉</button>
</div></div>
<div class="overlay" id="staffov"><div class="sheet">
  <h3>你是哪位工作人員？</h3>
  <p>用來記錄由誰報到，之後可統計。清單來自試算表「工作人員」分頁。</p>
  <div id="stafflist"></div>
</div></div>
<script>
/* ===== 貼上你的 Apps Script 部署網址（/exec 結尾）===== */
const API = "https://script.google.com/macros/s/AKfycbw5PYdytxOWpFbqOoICpeGPxx_T58p_fvjNRxbqk_9t_ur-LdYBOuo_SnGQEOv83AyP/exec";

const REGION_ORDER=['鴻毅區','愛珠區','成育區','麗惠區','文婷區','來賓'];
const ROLE_ORDER=['大區董','區董','區董(準)','董顧','董顧/大使','大使','大使(準)','助理大使'];
let MEETINGS=[], STAFF=[], PEOPLE=[], curId=null;
let staff=localStorage.getItem('ateam_checkin_staff')||'', q='', suppressUntil=0;
let pending={};  // 本機剛操作、等後端確認的項目，避免同步把它蓋回舊值
let editIdx=null;
const $=s=>document.querySelector(s);
const notSet=()=>API.startsWith('請貼上');
function nowHHMM(){const d=new Date(),p=n=>String(n).padStart(2,'0');return p(d.getHours())+':'+p(d.getMinutes());}
function fmtD(d){const a=String(d).split('-');return a.length===3?(+a[1])+'/'+(+a[2]):d;}
function api(params){const url=API+(API.includes('?')?'&':'?')+new URLSearchParams({...params,t:Date.now()});return fetch(url).then(r=>r.json());}
function reindex(){PEOPLE.forEach((p,i)=>p._i=i);}

async function boot(){
  if(notSet()){banner('尚未連線：請把後端 /exec 網址貼到本檔最上方的 const API');return;}
  showMe();
  $('#list').innerHTML='<div class="empty">載入中…</div>';
  try{const d=await api({action:'bootstrap'});if(!d.ok){banner('後端回應異常：'+(d.error||''));return;}
    MEETINGS=d.meetings||[];STAFF=d.staff||[];hideBanner();
    if(!staff)openStaff();
    if(MEETINGS.length){curId=MEETINGS[MEETINGS.length-1].id;await loadMeeting();}
    else{updateMsel();render();openMeet();}
  }catch(e){banner('連線失敗，請確認後端網址與部署權限');}
}
async function loadMeeting(){if(!curId)return;try{const d=await api({action:'meeting',id:curId});if(!d.ok)return;
  const now=Date.now();
  d.people.forEach(sp=>{const pd=pending[sp.name];if(!pd)return;
    const consistent=(sp.status===pd.status)&&(sp.paid===pd.paid);
    if(consistent){delete pending[sp.name];return;}                   // 後端已跟上，解除保護
    if(now>pd.until){delete pending[sp.name];return;}                 // 逾時放行，採用後端值
    sp.status=pd.status;sp.paid=pd.paid;if(pd.time)sp.time=pd.time;    // 保護期內，一律保留本機值
  });
  PEOPLE=d.people;reindex();render();hideBanner();}catch(e){}}
function poll(){if(!notSet()&&curId&&Date.now()>suppressUntil)loadMeeting();}

/* 報到 / 代理 / 收費 —— 防誤觸：往前免確認；已標記者鎖住，需長按才能修改 */
function tapName(i){if(!staff){openStaff();return;}const p=PEOPLE[i];if(!p)return;
  if(p.status&&p.status!=='未到'){toast('已報到 · 長按可修改');return;}   // 已標記→鎖住
  applyMark(p,'本人');}
function tapProxy(i){if(!staff){openStaff();return;}const p=PEOPLE[i];if(!p)return;
  if(p.status&&p.status!=='未到'){toast('已報到 · 長按可修改');return;}   // 已標記→鎖住
  applyMark(p,'代理');}
function tapPay(i){if(!staff){openStaff();return;}const p=PEOPLE[i];if(!p)return;
  if(!p.status||p.status==='未到'){toast('請先報到（點名字＝本人、按代理＝代理）');return;}
  if(p.paid){toast('已收費 · 長按名字可修改');return;}                    // 已收→鎖住
  applyPay(p,true);}
function applyMark(p,ns){
  p.status=ns;if(ns==='未到'){p.paid=false;p.time='';}else if(!p.time)p.time=nowHHMM();
  pending[p.name]={status:p.status,paid:p.paid,time:p.time,until:Date.now()+15000};
  suppressUntil=Date.now()+8000;render();
  api({action:'mark',id:curId,name:p.name,status:ns,staff}).then(d=>{if(!d.ok)banner(d.error||'剛剛那筆未送出');else hideBanner();}).catch(()=>banner('連線不穩，稍後會自動同步'));
}
function applyPay(p,val){
  p.paid=val;
  pending[p.name]={status:p.status,paid:p.paid,time:p.time,until:Date.now()+15000};
  suppressUntil=Date.now()+8000;render();
  api({action:'pay',id:curId,name:p.name,paid:val?'1':'0',staff}).then(d=>{if(!d.ok)banner(d.error||'剛剛那筆未送出');else hideBanner();}).catch(()=>banner('連線不穩，稍後會自動同步'));
}

/* 長按開啟修改選單（防誤觸：手滑不會觸發） */
let holdTimer=null, holdId=null;
function holdStart(i){holdId=i;clearTimeout(holdTimer);holdTimer=setTimeout(()=>{openEdit(i);},600);}
function holdEnd(){clearTimeout(holdTimer);}
function openEdit(i){const p=PEOPLE[i];if(!p||!p.status||p.status==='未到')return;
  if(navigator.vibrate)navigator.vibrate(15);
  editIdx=i;
  $('#editName').textContent=p.name;
  const opts=[];
  if(p.status==='本人')opts.push(['改為代理','proxy']);
  if(p.status==='代理')opts.push(['改為本人','self']);
  opts.push([p.paid?'取消收費':'標記已收費','pay']);
  opts.push(['取消報到（改未到）','cancel']);
  $('#editOpts').innerHTML=opts.map(o=>'<button class="btn stbtn" onclick="doEdit(\''+o[1]+'\')">'+o[0]+'</button>').join('');
  $('#editov').classList.add('show');}
function closeEdit(){$('#editov').classList.remove('show');}
function doEdit(act){const p=PEOPLE[editIdx];if(!p)return;closeEdit();
  if(act==='proxy')applyMark(p,'代理');
  else if(act==='self')applyMark(p,'本人');
  else if(act==='pay')applyPay(p,!p.paid);
  else if(act==='cancel')applyMark(p,'未到');
}

function render(){
  const P=PEOPLE,total=P.length;
  const self=P.filter(p=>p.status==='本人').length,proxy=P.filter(p=>p.status==='代理').length;
  const present=self+proxy,absent=total-present,paid=P.filter(p=>p.status&&p.status!=='未到'&&p.paid).length,due=present-paid;
  $('#cIn').textContent=present;$('#cTot').textContent=total;
  $('#bar').style.width=(total?present/total*100:0)+'%';
  let brk='<span>本人 <b>'+self+'</b></span><span>代理 <b class="p">'+proxy+'</b></span><span>未到 <b>'+absent+'</b></span><span>已收 <b>'+paid+'</b>/'+present+'</span>';
  if(due>0)brk+='<span class="due">待收 <b class="due">'+due+'</b></span>';
  brk+='<span class="stlink" onclick="openStats()">統計 ▸</span>';
  $('#brk').innerHTML=brk;
  const groups=groupByRegion(P);
  $('#chips').innerHTML=groups.map(g=>{const d=g.items.filter(p=>p.status&&p.status!=='未到').length;return '<span class="chip">'+g.name+' <b>'+d+'</b>/'+g.items.length+'</span>';}).join('');
  const kw=q.trim();
  const view=groupByRegion(P.filter(p=>!kw||p.name.includes(kw)||(p.chapter&&p.chapter.includes(kw))));
  if(view.every(g=>g.items.length===0)){$('#list').innerHTML='<div class="empty">'+(kw?'找不到「'+kw+'」':(curId?'':'請先建立或選擇會議'))+'</div>';updateMsel();return;}
  $('#list').innerHTML=view.filter(g=>g.items.length).map(g=>{const d=g.items.filter(p=>p.status&&p.status!=='未到').length;return '<div class="group"><h2>'+g.name+'<span class="g-count">'+d+'/'+g.items.length+'</span></h2>'+g.items.map(rowHtml).join('')+'</div>';}).join('');
  updateMsel();
}
function rowHtml(p){
  const meta=[p.chapter,p.role].filter(Boolean).join(' · ');
  let cls='',tick='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
  let sp=['<span style="color:var(--muted)">'+(meta||'—')+'</span>'];
  if(p.status==='本人'){cls='on';sp.push('<span class="t">✓本人 '+p.time+'</span>');}
  else if(p.status==='代理'){cls='proxy';tick='<span class="pk">代</span>';sp.push('<span class="tp">代理 '+p.time+'</span>');}
  if(p.status&&p.status!=='未到')sp.push(p.paid?'<span class="paid">已收費</span>':'<span class="duetxt">需收費</span>');
  const proxyBtn='<button class="pbtn '+(p.status==='代理'?'pon':'')+'" onclick="event.stopPropagation();tapProxy('+p._i+')">代理</button>';
  const payBtn='<button class="pbtn '+((p.status&&p.status!=='未到')?(p.paid?'paid':'due'):'')+'" onclick="event.stopPropagation();tapPay('+p._i+')">'+(p.paid?'已收':'收費')+'</button>';
  return '<div class="row '+cls+'" onclick="tapName('+p._i+')" ontouchstart="holdStart('+p._i+')" ontouchend="holdEnd()" ontouchmove="holdEnd()" onmousedown="holdStart('+p._i+')" onmouseup="holdEnd()" onmouseleave="holdEnd()"><div class="tick">'+tick+'</div><div class="who"><div class="nm">'+p.name+'</div><div class="sub">'+sp.join('')+'</div></div><div class="acts">'+proxyBtn+payBtn+'</div></div>';
}
function groupByRegion(arr){const map={};arr.forEach(p=>{(map[p.region]=map[p.region]||[]).push(p);});const names=Object.keys(map).sort((a,b)=>{const ia=REGION_ORDER.indexOf(a),ib=REGION_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});return names.map(n=>({name:n,items:map[n]}));}

/* 統計 */
function openStats(){renderStats();$('#statsov').classList.add('show');}
function closeStats(){$('#statsov').classList.remove('show');}
function srow(lb,n,d){const pct=d?Math.round(n/d*100):0;return '<div class="strow"><span class="lb">'+lb+'</span><div class="sbar"><i style="width:'+pct+'%"></i></div><span class="nm2">'+n+'/'+d+'</span><span class="pct">'+pct+'%</span></div>';}
function renderStats(){
  const P=PEOPLE,total=P.length,pres=p=>p.status&&p.status!=='未到';
  const self=P.filter(p=>p.status==='本人').length,proxy=P.filter(p=>p.status==='代理').length;
  const present=self+proxy,absent=total-present,paid=P.filter(p=>pres(p)&&p.paid).length;
  // 未出席名單（完全未到），依五區分組，顯示 姓名 · 輔導分會
  let h='<div class="ssec">未出席名單（'+absent+' 位）</div>';
  const abs=P.filter(p=>!p.status||p.status==='未到');
  if(abs.length===0){h+='<div style="font-size:13px;color:var(--present);font-weight:700;padding:6px 0 2px">全員到齊 🎉</div>';}
  else{groupByRegion(abs).forEach(g=>{
    h+='<div style="margin:8px 0 2px;font-size:12px;font-weight:700;color:var(--muted)">'+g.name+'（'+g.items.length+'）</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:6px">'+g.items.map(p=>'<span style="display:inline-flex;align-items:baseline;gap:4px;background:#FBEEEC;border:1px solid #F3CFC9;border-radius:8px;padding:4px 9px;font-size:13px"><b style="color:#1B1B1A;font-weight:700">'+p.name+'</b><span style="color:var(--muted);font-size:11px">'+(p.chapter||'')+'</span></span>').join('')+'</div>';
  });}
  h+='<div class="ssec">整體（應到 '+total+'）</div>';
  h+=srow('總出席率',present,total)+srow('本人出席',self,total)+srow('代理出席',proxy,total)+srow('缺席',absent,total);
  h+='<div class="ssec">各區出席率</div>';groupByRegion(P).forEach(g=>{h+=srow(g.name,g.items.filter(pres).length,g.items.length);});
  h+='<div class="ssec">各職稱出席率</div>';const roles={};P.forEach(p=>{(roles[p.role]=roles[p.role]||[]).push(p);});
  Object.keys(roles).sort((a,b)=>{const ia=ROLE_ORDER.indexOf(a),ib=ROLE_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);}).forEach(r=>{const a=roles[r];h+=srow(r||'其他',a.filter(pres).length,a.length);});
  h+='<div class="ssec">各分會董顧大使團出席率</div>';
  {const order=[],cmap={};P.forEach(p=>{const lead=['大區董','區董','區董(準)'].includes(p.role);const key=lead?'區督導層':(p.chapter||'其他');if(!(key in cmap)){cmap[key]=[];order.push(key);}cmap[key].push(p);});const rest=order.filter(k=>k!=='區督導層'),lead=order.filter(k=>k==='區督導層');rest.concat(lead).forEach(k=>{const a=cmap[k];h+=srow(k,a.filter(pres).length,a.length);});}
  $('#statsbody').innerHTML=h;
}

/* 名單外新增 */
/* ── 本場統計 匯出（文字 / 圖卡）── */
function statsData(){
  const P=PEOPLE,total=P.length,pres=p=>p.status&&p.status!=='未到';
  const self=P.filter(p=>p.status==='本人').length,proxy=P.filter(p=>p.status==='代理').length;
  const present=self+proxy,absent=total-present;
  const m=MEETINGS.find(x=>x.id===curId)||{date:'',name:'本場'};
  const regions=groupByRegion(P).map(g=>({name:g.name,present:g.items.filter(pres).length,tot:g.items.length}));
  const roles={};P.forEach(p=>{(roles[p.role]=roles[p.role]||[]).push(p);});
  const roleRows=Object.keys(roles).sort((a,b)=>{const ia=ROLE_ORDER.indexOf(a),ib=ROLE_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);}).map(r=>({name:r||'其他',present:roles[r].filter(pres).length,tot:roles[r].length}));
  const absList=groupByRegion(P.filter(p=>!p.status||p.status==='未到')).map(g=>({name:g.name,people:g.items.map(p=>p.name+(p.chapter?'（'+p.chapter+'）':''))}));
  const pc=(n,d)=>d?Math.round(n/d*100):0;
  return {m,total,self,proxy,present,absent,rate:pc(present,total),regions,roleRows,absList,pc};
}
function statsText(){
  const d=statsData();
  let t='📋 '+d.m.name+'　'+d.m.date+'\n';
  t+='─────────────\n';
  t+='應到 '+d.total+'　實到 '+d.present+'　出席率 '+d.rate+'%\n';
  t+='本人 '+d.self+'　代理 '+d.proxy+'　未到 '+d.absent+'\n\n';
  t+='【各區出席率】\n';
  d.regions.forEach(r=>{t+='· '+r.name+' '+r.present+'/'+r.tot+'（'+d.pc(r.present,r.tot)+'%）\n';});
  t+='\n【未出席名單 '+d.absent+' 位】\n';
  if(d.absent===0)t+='全員到齊 🎉\n';
  else d.absList.forEach(g=>{if(g.people.length)t+='◆ '+g.name+'：'+g.people.join('、')+'\n';});
  return t;
}
function copyStatsText(){const t=statsText();
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast('已複製，可貼到 LINE')).catch(()=>fallbackCopy(t));}
  else fallbackCopy(t);}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('已複製，可貼到 LINE');}catch(e){alert(t);}document.body.removeChild(ta);}

function exportStatsCard(){
  const d=statsData();
  const W=1080,dpr=2,pad=60;
  // 預估高度
  const H = 300 + 170 + 70 + d.regions.length*54 + 90 + d.absList.reduce((a,g)=>a+(g.people.length?60:0),0) + 80;
  const c=document.createElement('canvas'),ctx=c.getContext('2d');
  c.width=W*dpr;c.height=H*dpr;ctx.scale(dpr,dpr);
  const CO={bg:'#FAFAF7',card:'#FFFFFF',ink:'#1B1B1A',mut:'#8C887E',line:'#ECE8DF',gold:'#C9A24B',green:'#1FA463',proxy:'#C9862B',red:'#C8102E'};
  const FT=w=>w+"px 'Noto Sans TC',sans-serif";
  ctx.fillStyle=CO.bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=CO.gold;ctx.fillRect(0,0,W,10);
  ctx.fillStyle=CO.gold;ctx.font='700 '+FT(26);ctx.fillText('A-TEAM 董顧大使團',pad,78);
  ctx.fillStyle=CO.ink;ctx.font='900 '+FT(54);ctx.fillText(d.m.name,pad,144);
  ctx.fillStyle=CO.mut;ctx.font='500 '+FT(28);ctx.fillText(d.m.date+'　現場報到統計',pad,188);
  // 大數字列
  ctx.font='800 '+FT(30);
  ctx.fillStyle=CO.mut;ctx.fillText('應到 ',pad,244);let x=pad+ctx.measureText('應到 ').width;
  ctx.fillStyle=CO.ink;ctx.fillText(d.total+'　',x,244);x+=ctx.measureText(d.total+'　').width;
  ctx.fillStyle=CO.mut;ctx.fillText('實到 ',x,244);x+=ctx.measureText('實到 ').width;
  ctx.fillStyle=CO.green;ctx.fillText(d.present+'　',x,244);x+=ctx.measureText(d.present+'　').width;
  ctx.fillStyle=CO.mut;ctx.fillText('出席率 ',x,244);x+=ctx.measureText('出席率 ').width;
  ctx.fillStyle=CO.green;ctx.fillText(d.rate+'%',x,244);
  // 三宮格
  const gy=280,gap=24,gw=(W-pad*2-gap*2)/3,gh=150;
  [['本人',d.self,CO.green],['代理',d.proxy,CO.proxy],['未到',d.absent,CO.red]].forEach((cell,i)=>{
    const cx=pad+i*(gw+gap);roundRect(ctx,cx,gy,gw,gh,18);ctx.fillStyle=CO.card;ctx.fill();ctx.strokeStyle=CO.line;ctx.stroke();
    ctx.fillStyle=cell[2];ctx.font='900 '+FT(66);ctx.textAlign='center';ctx.fillText(cell[1],cx+gw/2,gy+86);
    ctx.fillStyle=CO.mut;ctx.font='700 '+FT(26);ctx.fillText(cell[0],cx+gw/2,gy+124);ctx.textAlign='left';});
  let yy=gy+gh+56;
  const secTitle=(t)=>{ctx.fillStyle=CO.ink;ctx.font='800 '+FT(30);ctx.fillText(t,pad,yy);yy+=44;};
  const bar=(name,pres,tot)=>{const pc=tot?Math.round(pres/tot*100):0;
    ctx.fillStyle=CO.ink;ctx.font='700 '+FT(28);ctx.fillText(name,pad,yy+6);
    ctx.fillStyle=CO.mut;ctx.font='500 '+FT(24);ctx.textAlign='right';ctx.fillText(pres+'/'+tot,W-pad-90,yy+6);
    ctx.fillStyle=(pc>=80?CO.green:pc>=60?CO.gold:CO.red);ctx.font='800 '+FT(30);ctx.fillText(pc+'%',W-pad,yy+6);ctx.textAlign='left';
    const tx=pad+180,tw=W-pad-180-160;ctx.fillStyle=CO.line;roundRect(ctx,tx,yy-14,tw,12,6);ctx.fill();
    ctx.fillStyle=(pc>=80?CO.green:pc>=60?CO.gold:CO.red);roundRect(ctx,tx,yy-14,tw*pc/100,12,6);ctx.fill();
    yy+=54;};
  secTitle('各區出席率');d.regions.forEach(r=>bar(r.name,r.present,r.tot));yy+=16;
  secTitle('未出席名單（'+d.absent+' 位）');
  if(d.absent===0){ctx.fillStyle=CO.green;ctx.font='700 '+FT(28);ctx.fillText('全員到齊 🎉',pad,yy);yy+=54;}
  else d.absList.forEach(g=>{if(!g.people.length)return;
    ctx.fillStyle=CO.red;ctx.font='700 '+FT(26);ctx.fillText('◆ '+g.name,pad,yy);
    ctx.fillStyle=CO.ink;ctx.font='500 '+FT(26);
    const names=g.people.join('、');wrapText(ctx,names,pad+150,yy,W-pad-150-pad,38);
    yy+=Math.max(1,Math.ceil(ctx.measureText(names).width/(W-pad-150-pad)))*38+18;});
  c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='本場統計_'+d.m.name+'.png';a.click();},'image/png');
}
function wrapText(ctx,text,x,y,maxW,lh){const chars=text.split('');let line='',yy=y;for(let i=0;i<chars.length;i++){const t=line+chars[i];if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,yy);line=chars[i];yy+=lh;}else line=t;}ctx.fillText(line,x,yy);}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function openAdd(){if(!staff){openStaff();return;}if(!curId){toast('請先選擇會議');return;}$('#apName').value='';$('#apChapter').value='';$('#apRole').value='';$('#apRegion').value='鴻毅區';$('#addov').classList.add('show');}
function closeAdd(){$('#addov').classList.remove('show');}
function doAddPerson(){const n=$('#apName').value.trim();if(!n){alert('請填姓名');return;}
  suppressUntil=Date.now()+5000;
  api({action:'add',id:curId,name:n,region:$('#apRegion').value,chapter:$('#apChapter').value.trim(),role:$('#apRole').value.trim(),staff}).then(d=>{if(d.ok){PEOPLE=d.people;reindex();closeAdd();render();toast('已新增並報到：'+n);}else alert(d.error||'新增失敗');});}

/* 會議 */
function updateMsel(){const m=MEETINGS.find(x=>x.id===curId);if(m){$('#mselD').textContent=fmtD(m.date);$('#mselN').textContent=m.name;}else{$('#mselD').textContent='';$('#mselN').textContent='尚未建立會議';}}
function openMeet(){renderMlist();const t=new Date();$('#newDate').value=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');$('#newName').value='';$('#mnewBox').style.display='none';$('#newToggle').style.display='block';$('#meet').classList.add('show');}
function toggleNew(){$('#mnewBox').style.display='block';$('#newToggle').style.display='none';}
function closeMeet(){$('#meet').classList.remove('show');}
function renderMlist(){$('#mlist').innerHTML=MEETINGS.length?MEETINGS.slice().reverse().map(m=>'<div class="mitem '+(m.id===curId?'cur':'')+'" onclick="selectMeeting(\''+m.id+'\')"><div><div class="mn">'+m.name+'</div><div class="ms">'+m.date+'</div></div><div class="cnt">'+(m.count||0)+'</div></div>').join(''):'<div class="empty" style="padding:16px">尚無會議，請於下方建立</div>';}
function selectMeeting(id){curId=id;closeMeet();loadMeeting();}
function createMeeting(){const d=$('#newDate').value,n=$('#newName').value.trim();if(!d||!n){alert('請填日期與名稱');return;}
  api({action:'create',date:d,name:n}).then(r=>{if(r.ok){curId=r.id;MEETINGS.push({id:r.id,date:d,name:n,count:0});PEOPLE=r.people;reindex();closeMeet();render();toast('已建立：'+n);}else alert(r.error||'建立失敗');});}
function resetMeeting(){if(!curId){toast('尚未選擇會議');return;}if(!confirm('清空本場所有報到狀態？（名單保留）'))return;
  suppressUntil=Date.now()+5000;api({action:'reset',id:curId}).then(r=>{if(r.ok){PEOPLE=r.people;reindex();closeMeet();render();toast('已清空本場');}});}

/* 工作人員 */
function openStaff(){const list=STAFF.length?STAFF.map(n=>'<button class="btn stbtn" onclick="pickStaff(\''+n+'\')">'+n+'</button>').join(''):'<p style="color:var(--muted);font-size:13px">「工作人員」分頁尚無名單，可先手動輸入。</p>';$('#stafflist').innerHTML=list+'<button class="btn stbtn" onclick="otherStaff()">其他…（手動輸入）</button>';$('#staffov').classList.add('show');}
function pickStaff(n){staff=n;localStorage.setItem('ateam_checkin_staff',n);showMe();$('#staffov').classList.remove('show');}
function otherStaff(){const n=prompt('工作人員姓名');if(n&&n.trim())pickStaff(n.trim());}
function showMe(){$('#me').innerHTML=staff?'操作中：<b>'+staff+'</b>（點此可換人）':'尚未設定 · 點此選工作人員';}

/* 匯出 */
function exportCsv(){const m=MEETINGS.find(x=>x.id===curId)||{date:'',name:''};const rows=[['會議日期','會議名稱','姓名','區域','輔導分會','職稱','報到','收費','報到時間','報到人員']];PEOPLE.forEach(p=>rows.push([m.date,m.name,p.name,p.region,p.chapter,p.role,p.status||'未到',(p.status&&p.status!=='未到')?(p.paid?'已收':'未收'):'',p.time,p.staffName||'']));const csv='\uFEFF'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=(m.date||'報到')+'_'+(m.name||'')+'.csv';a.click();}

let toastTimer;function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1500);}
function banner(msg){const b=$('#banner');b.textContent=msg;b.style.display='block';}
function hideBanner(){$('#banner').style.display='none';}

$('#q').addEventListener('input',e=>{q=e.target.value;render();});
showMe();boot();setInterval(poll,6000);
